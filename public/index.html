<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Chatbot v2</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #eef6ff; color: #0f172a; }
    header { padding: 18px 24px; background: linear-gradient(135deg, #0f5ea8, #1e3a8a); color: white; display: flex; justify-content: space-between; align-items: center; }
    header a { color: white; text-decoration: none; background: rgba(255,255,255,.18); padding: 10px 14px; border-radius: 10px; font-size: 14px; }
    header a:hover { background: rgba(255,255,255,.28); }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 360px; gap: 18px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,.09); padding: 18px; }
    h2 { margin-top: 0; }
    #messages { height: 560px; overflow-y: auto; padding: 12px; background: #f8fafc; border-radius: 14px; border: 1px solid #e2e8f0; }
    .msg { margin: 10px 0; max-width: 85%; padding: 12px 14px; border-radius: 14px; white-space: pre-wrap; line-height: 1.5; word-wrap: break-word; }
    .user { margin-left: auto; background: #2563eb; color: white; }
    .bot { background: white; border: 1px solid #e2e8f0; }
    .source { color: #64748b; font-size: 12px; margin-top: 6px; }
    .input-row { display: flex; gap: 10px; margin-top: 12px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; }
    button { border: 0; padding: 10px 14px; border-radius: 10px; background: #0f5ea8; color: white; font-weight: 700; cursor: pointer; font-size: 14px; }
    button:hover { background: #0d4f8c; }
    button.secondary { background: #64748b; }
    button.good { background: #16a34a; }
    button.warn { background: #f59e0b; }
    .examples button { display: block; width: 100%; margin: 8px 0; text-align: left; background: #e0f2fe; color: #075985; padding: 10px; }
    .examples button:hover { background: #bae6fd; }
    .feedback-box { display: none; margin-top: 8px; background: #fff7ed; border: 1px solid #fed7aa; padding: 10px; border-radius: 10px; }
    .small { color: #64748b; font-size: 13px; line-height: 1.5; }
    .sources-list { list-style: none; padding: 0; margin: 8px 0 0; }
    .sources-list li { font-size: 13px; padding: 4px 0; border-bottom: 1px dashed #e2e8f0; }
    .sources-list li:last-child { border-bottom: none; }
    .sources-list a { color: #0f5ea8; text-decoration: none; }
    .sources-list a:hover { text-decoration: underline; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div>
      <b>🏥 Hospital Chatbot v2</b>
      <div class="small" style="color:#dbeafe">AnythingLLM + MySQL + Trusted Sources + SQL Templates</div>
    </div>
    <a href="/admin.html">Admin Studio →</a>
  </header>

  <div class="container">
    <main class="card">
      <h2>Chatbot bệnh viện</h2>
      <div id="messages"></div>
      <div class="input-row">
        <input id="messageInput" placeholder="Nhập câu hỏi..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()">Gửi</button>
      </div>
    </main>

    <aside>
      <div class="card">
        <h3 style="margin-top:0">Câu hỏi demo</h3>
        <div class="examples">
          <button onclick="ask('cho tôi file bảng giá dịch vụ')">cho tôi file bảng giá dịch vụ</button>
          <button onclick="ask('khoa nào có lượt khám cao nhất')">khoa nào có lượt khám cao nhất</button>
          <button onclick="ask('lượt khám của mỗi khoa')">lượt khám của mỗi khoa</button>
          <button onclick="ask('khoa ngoại có bao nhiêu lượt khám')">khoa ngoại có bao nhiêu lượt khám</button>
          <button onclick="ask('hôm nay có bao nhiêu nhân sự đang trực')">hôm nay có bao nhiêu nhân sự đang trực</button>
          <button onclick="ask('hôm nay có ai trực')">hôm nay có ai trực</button>
          <button onclick="ask('triệu chứng của tiểu đường là gì')">triệu chứng của tiểu đường là gì</button>
        </div>
      </div>
      <div class="card" style="margin-top:14px">
        <h3 style="margin-top:0">Nguồn tham khảo</h3>
        <div class="small">Chatbot chỉ tra cứu từ các nguồn dưới đây:</div>
        <ul id="trustedSourcesList" class="sources-list"><li class="small">Đang tải...</li></ul>
      </div>
    </aside>
  </div>

  <script>
    // ----------- Session -----------
    const sessionId = (function() {
      let s = localStorage.getItem('chatSessionId');
      if (!s) {
        s = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2));
        localStorage.setItem('chatSessionId', s);
      }
      return s;
    })();

    let lastUserQuestion = '';
    let lastBotAnswer = '';

    // ----------- DOM helpers -----------
    function $(id) { return document.getElementById(id); }
    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // Markdown rất nhỏ với URL sanitize
    function renderMarkdownLite(text) {
      // Bước 1: extract markdown link [label](url) ra placeholder TRƯỚC khi escape html
      // để URL gốc giữ nguyên & không bị escape thành &amp;
      const links = [];
      let working = String(text ?? '').replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(match, label, url) {
        const trimmed = url.trim();
        const safe = trimmed.startsWith('/') || /^https?:\/\//i.test(trimmed);
        if (!safe) return label; // unsafe URL → chỉ giữ label
        const idx = links.length;
        links.push({ label: label, url: trimmed });
        return '\u0000LINK' + idx + '\u0000';
      });

      // Bước 2: escape html toàn bộ text còn lại (placeholder \u0000LINK..\u0000 không bị động)
      let html = escapeHtml(working);

      // Bước 3: thay placeholder bằng <a> tag với URL chưa escape & (chỉ escape " để không break href)
      html = html.replace(/\u0000LINK(\d+)\u0000/g, function(match, idx) {
        const link = links[Number(idx)];
        const safeHref = link.url.replaceAll('"', '%22');
        return '<a href="' + safeHref + '" target="_blank" rel="noopener">' + escapeHtml(link.label) + '</a>';
      });

      // Bước 4: bold
      html = html.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
      return html;
    }

    function ask(text) {
      $('messageInput').value = text;
      sendMessage();
    }

    function addMessage(text, type, source) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + type;
      wrap.innerHTML = renderMarkdownLite(text);

      if (source) {
        const s = document.createElement('div');
        s.className = 'source';
        s.textContent = 'source: ' + source;
        wrap.appendChild(s);
      }

      if (type === 'bot') {
        const actions = document.createElement('div');
        actions.style.marginTop = '8px';

        const goodBtn = document.createElement('button');
        goodBtn.className = 'good';
        goodBtn.textContent = '👍 Đúng';
        goodBtn.onclick = sendGoodFeedback;

        const warnBtn = document.createElement('button');
        warnBtn.className = 'warn';
        warnBtn.textContent = '✏️ Góp ý';
        warnBtn.style.marginLeft = '6px';
        warnBtn.onclick = function() { toggleFeedback(this); };

        const fb = document.createElement('div');
        fb.className = 'feedback-box';
        fb.innerHTML = '<textarea placeholder="Nhập góp ý hoặc câu trả lời đúng"></textarea><br><br><button>Gửi góp ý</button>';
        fb.querySelector('button').onclick = function() { sendCorrectionFeedback(this); };

        actions.appendChild(goodBtn);
        actions.appendChild(warnBtn);
        actions.appendChild(fb);
        wrap.appendChild(actions);
      }

      $('messages').appendChild(wrap);
      $('messages').scrollTop = $('messages').scrollHeight;
      return wrap;
    }

    async function sendMessage() {
      const input = $('messageInput');
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      lastUserQuestion = message;
      addMessage(message, 'user');
      const loading = addMessage('Đang xử lý...', 'bot');
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message, sessionId: sessionId })
        });
        const data = await res.json();
        loading.remove();
        lastBotAnswer = data.reply || data.error || 'Không có phản hồi';
        addMessage(lastBotAnswer, 'bot', data.source || 'unknown');
      } catch (err) {
        loading.remove();
        lastBotAnswer = 'Lỗi gọi backend: ' + err.message;
        addMessage(lastBotAnswer, 'bot', 'frontend-error');
      }
    }

    function toggleFeedback(btn) {
      const box = btn.parentElement.querySelector('.feedback-box');
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function sendGoodFeedback() {
      await submitFeedback('positive', 'Câu trả lời đúng');
      alert('Đã ghi nhận phản hồi đúng.');
    }

    async function sendCorrectionFeedback(btn) {
      const correction = btn.parentElement.querySelector('textarea').value.trim();
      if (!correction) return alert('Nhập nội dung góp ý.');
      await submitFeedback('correction', correction);
      alert('Đã gửi góp ý.');
      btn.parentElement.style.display = 'none';
    }

    async function submitFeedback(type, correction) {
      try {
        await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userQuestion: lastUserQuestion,
            botAnswer: lastBotAnswer,
            userCorrection: correction,
            feedbackType: type
          })
        });
      } catch (err) {
        alert('Không gửi được feedback: ' + err.message);
      }
    }

    // ----------- Load trusted sources -----------
    async function loadTrustedSources() {
      try {
        const res = await fetch('/api/trusted-sources');
        const sources = await res.json();
        const list = $('trustedSourcesList');
        if (!sources.length) {
          list.innerHTML = '<li class="small">Chưa có nguồn nào được duyệt.</li>';
          return;
        }
        list.innerHTML = sources.map(function(s) {
          const url = s.url && /^https?:\/\//i.test(s.url) ? s.url : '#';
          return '<li><a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(s.name) + '</a> <span class="small">(' + escapeHtml(s.domain) + ')</span></li>';
        }).join('');
      } catch (err) {
        $('trustedSourcesList').innerHTML = '<li class="small">Không tải được danh sách nguồn.</li>';
      }
    }
    loadTrustedSources();
  </script>
</body>
</html>
