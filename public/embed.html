<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        background: #ffffff;
        color: #0f172a;
      }

      header {
        background: linear-gradient(135deg, #0f5ea8, #1e3a8a);
        color: white;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      header .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: white;
        color: #0f5ea8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
      }
      header .info {
        flex: 1;
      }
      header .title {
        font-weight: 600;
        font-size: 14px;
      }
      header .status {
        font-size: 11px;
        opacity: 0.8;
      }
      header .close-btn {
        background: rgba(255, 255, 255, 0.15);
        border: 0;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        display: none;
      }
      header .close-btn:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        background: #f8fafc;
      }
      .msg {
        margin: 8px 0;
        max-width: 85%;
        padding: 10px 13px;
        border-radius: 14px;
        white-space: pre-wrap;
        line-height: 1.5;
        word-wrap: break-word;
        font-size: 14px;
      }
      .user {
        margin-left: auto;
        background: #2563eb;
        color: white;
      }
      .bot {
        background: white;
        border: 1px solid #e2e8f0;
      }
      .bot a {
        color: #0f5ea8;
        text-decoration: none;
      }
      .bot a:hover {
        text-decoration: underline;
      }

      .welcome {
        padding: 16px 14px;
        background: #f0f9ff;
        border-bottom: 1px solid #e0f2fe;
        font-size: 13px;
        color: #0c4a6e;
        line-height: 1.5;
      }
      .welcome b {
        color: #0f5ea8;
      }

      .quick-suggest {
        padding: 0 14px 8px;
        background: #f8fafc;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .quick-suggest button {
        background: white;
        border: 1px solid #cbd5e1;
        padding: 5px 10px;
        border-radius: 12px;
        font-size: 12px;
        color: #475569;
        cursor: pointer;
        font-family: inherit;
      }
      .quick-suggest button:hover {
        border-color: #0f5ea8;
        color: #0f5ea8;
      }

      .input-bar {
        padding: 10px 12px;
        background: white;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      .input-bar input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 22px;
        font-size: 14px;
        font-family: inherit;
        outline: 0;
      }
      .input-bar input:focus {
        border-color: #0f5ea8;
      }
      .input-bar button {
        background: #0f5ea8;
        color: white;
        border: 0;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
      }
      .input-bar button:hover {
        background: #0d4f8c;
      }
      .input-bar button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .typing {
        display: inline-flex;
        gap: 3px;
        padding: 4px 0;
      }
      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #94a3b8;
        animation: typing 1.2s infinite;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes typing {
        0%,
        60%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        30% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }

      body.in-widget header .close-btn {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="avatar">🏥</div>
      <div class="info">
        <div class="title" id="botTitle">Hospital Chatbot</div>
        <div class="status">● Online</div>
      </div>
      <button
        class="close-btn"
        onclick="parent.postMessage({ type: 'chatbot:close' }, '*')"
        title="Đóng"
      >
        ✕
      </button>
    </header>

    <div class="welcome" id="welcomeBox">
      Xin chào! Mình có thể giúp bạn về <b>thông tin bệnh viện</b>,
      <b>lịch trực</b>, <b>quy trình khám</b>, hoặc tra cứu <b>tài liệu</b>.
    </div>

    <div class="quick-suggest" id="quickSuggest">
      <button onclick="ask('khoa nào có lượt khám cao nhất')">
        Khoa nào đông nhất?
      </button>
      <button onclick="ask('hôm nay có ai trực')">Hôm nay ai trực?</button>
      <button onclick="ask('quy trình khám BHYT')">Quy trình khám BHYT</button>
      <button onclick="ask('cho tôi file bảng giá dịch vụ')">
        Bảng giá dịch vụ
      </button>
    </div>

    <div id="messages"></div>

    <div class="input-bar">
      <input
        id="messageInput"
        placeholder="Nhập câu hỏi..."
        onkeydown="if (event.key === 'Enter') sendMessage();"
      />
      <button id="sendBtn" onclick="sendMessage()" title="Gửi">➤</button>
    </div>

    <script>
      const sessionId = (function () {
        let s = sessionStorage.getItem("chatSessionId");
        if (!s) {
          s =
            window.crypto && crypto.randomUUID
              ? crypto.randomUUID()
              : Date.now() + "-" + Math.random().toString(36).slice(2);
          sessionStorage.setItem("chatSessionId", s);
        }
        return s;
      })();

      let API_BASE = window.location.origin;

      if (window.parent !== window) {
        document.body.classList.add("in-widget");
        window.addEventListener("message", (e) => {
          const msg = e.data;
          if (!msg || typeof msg !== "object") return;
          if (msg.type === "chatbot:config") {
            if (msg.apiBase) API_BASE = msg.apiBase;
            if (msg.title)
              document.getElementById("botTitle").textContent = msg.title;
            if (msg.welcome)
              document.getElementById("welcomeBox").innerHTML = msg.welcome;
            if (msg.hideSuggest)
              document.getElementById("quickSuggest").style.display = "none";
            if (msg.hideWelcome)
              document.getElementById("welcomeBox").style.display = "none";
          }
        });
        parent.postMessage({ type: "chatbot:ready" }, "*");
      }

      function $(id) {
        return document.getElementById(id);
      }
      function escapeHtml(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
      function renderMarkdownLite(text) {
        const links = [];
        let working = String(text ?? "").replace(
          /\[([^\]]+)\]\(([^)]+)\)/g,
          function (m, label, url) {
            const trimmed = url.trim();
            const safe =
              trimmed.startsWith("/") || /^https?:\/\//i.test(trimmed);
            if (!safe) return label;
            const idx = links.length;
            links.push({ label: label, url: trimmed });
            return "\u0000LINK" + idx + "\u0000";
          },
        );
        let html = escapeHtml(working);
        html = html.replace(/\u0000LINK(\d+)\u0000/g, function (m, idx) {
          const link = links[Number(idx)];
          const safeHref = link.url.replaceAll('"', "%22");
          return (
            '<a href="' +
            safeHref +
            '" target="_blank" rel="noopener">' +
            escapeHtml(link.label) +
            "</a>"
          );
        });
        html = html.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
        return html;
      }

      function ask(text) {
        $("messageInput").value = text;
        sendMessage();
      }

      function addMessage(text, type) {
        const wrap = document.createElement("div");
        wrap.className = "msg " + type;
        wrap.innerHTML = renderMarkdownLite(text);
        $("messages").appendChild(wrap);
        $("messages").scrollTop = $("messages").scrollHeight;
        return wrap;
      }

      let busy = false;
      async function sendMessage() {
        if (busy) return;
        const input = $("messageInput");
        const message = input.value.trim();
        if (!message) return;
        input.value = "";
        addMessage(message, "user");
        $("quickSuggest").style.display = "none";
        $("welcomeBox").style.display = "none";

        const loading = addMessage("", "bot");
        loading.innerHTML =
          '<span class="typing"><span></span><span></span><span></span></span>';
        busy = true;
        $("sendBtn").disabled = true;

        try {
          const res = await fetch(API_BASE + "/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, sessionId: sessionId }),
          });
          const data = await res.json();
          loading.innerHTML = renderMarkdownLite(
            data.reply || data.error || "Không có phản hồi",
          );
        } catch (err) {
          loading.innerHTML = "Lỗi: " + escapeHtml(err.message);
        } finally {
          busy = false;
          $("sendBtn").disabled = false;
          $("messageInput").focus();
          $("messages").scrollTop = $("messages").scrollHeight;
        }
      }
    </script>
  </body>
</html>
